<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>logo_final_clean_from_new_image</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
  }
  body {
    display: grid;
    place-items: center;
  }
  .stage {
    width: 100vw;
    height: 100vh;
    display: grid;
    place-items: center;
    background: #ffffff;
  }
  .logo-wrap {
    position: relative;
    width: min(52vmin, 560px);
    aspect-ratio: 1 / 1;
    display: grid;
    place-items: center;
  }
  .core-light {
    position: absolute;
    width: 80%;
    height: 80%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.98) 40%, rgba(255,255,255,0.72) 60%, rgba(255,255,255,0) 100%);
    filter: blur(10px);
    opacity: 0;
    transform: scale(0.52);
    animation: coreLight 2.2s ease-out forwards;
  }
  .flash {
    position: absolute;
    width: 96%;
    height: 18%;
    background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0) 100%);
    transform: rotate(-33deg) translateX(-170%);
    filter: blur(7px);
    opacity: 0;
    animation: sweep 1.8s ease-in-out .55s forwards;
  }
  .logo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transform: scale(0.84);
    filter:
      brightness(2.2)
      blur(10px)
      drop-shadow(0 0 14px rgba(255,255,255,1))
      drop-shadow(0 0 36px rgba(255,255,255,1));
    animation: logoReveal 2.3s cubic-bezier(.2,.72,.2,1) .1s forwards;
  }
  .white-burst {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,1) 0%, rgba(255,255,255,0.98) 24%, rgba(255,255,255,0) 58%);
    opacity: 0;
    animation: burst 1.0s ease-out .15s forwards;
    pointer-events: none;
  }

  @keyframes coreLight {
    0%   { opacity: 0; transform: scale(0.45); }
    50%  { opacity: 1; }
    100% { opacity: 0.92; transform: scale(1.08); }
  }
  @keyframes sweep {
    0%   { opacity: 0; transform: rotate(-33deg) translateX(-170%); }
    18%  { opacity: 1; }
    64%  { opacity: 1; }
    100% { opacity: 0; transform: rotate(-33deg) translateX(170%); }
  }
  @keyframes burst {
    0%   { opacity: 0; }
    25%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes logoReveal {
    0% {
      opacity: 0;
      transform: scale(0.84);
      filter:
        brightness(2.5)
        blur(14px)
        drop-shadow(0 0 20px rgba(255,255,255,1))
        drop-shadow(0 0 44px rgba(255,255,255,1));
    }
    38% {
      opacity: 1;
      transform: scale(1.02);
      filter:
        brightness(1.9)
        blur(4px)
        drop-shadow(0 0 14px rgba(255,255,255,1))
        drop-shadow(0 0 28px rgba(255,255,255,1));
    }
    70% {
      opacity: 1;
      transform: scale(1);
      filter:
        brightness(1.05)
        blur(0.4px)
        drop-shadow(0 0 6px rgba(255,255,255,0.7))
        drop-shadow(0 0 12px rgba(255,255,255,0.6));
    }
    100% {
      opacity: 1;
      transform: scale(1);
      filter:
        brightness(1)
        blur(0)
        drop-shadow(0 0 0 rgba(255,255,255,0))
        drop-shadow(0 0 0 rgba(255,255,255,0));
    }
  }
</style>
